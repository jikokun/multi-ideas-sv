<div id="auth-modal" class="auth-modal-overlay">
    <div class="auth-modal-card">
        <button id="auth-modal-close" class="auth-close-btn" aria-label="Cerrar modal">&times;</button>
        
        <div class="auth-tabs">
            <button id="tab-login" class="auth-tab-btn active">Iniciar Sesión</button>
            <button id="tab-register" class="auth-tab-btn">Registrarse</button>
        </div>

        <form id="auth-form" class="auth-form-content">
            <h3 id="auth-title">Ingresa a tu cuenta</h3>
            <p id="auth-subtitle" class="auth-subtitle">Accede a todas las funciones de Multi Ideas Sv</p>

            <div class="auth-input-group" id="group-name" style="display: none;">
                <label for="auth-name">Nombre Completo</label>
                <input type="text" id="auth-name" placeholder="Tu nombre" autocomplete="name">
            </div>

            <div class="auth-input-group">
                <label for="auth-email">Correo Electrónico</label>
                <input type="email" id="auth-email" required placeholder="correo@ejemplo.com" autocomplete="email">
            </div>

            <div class="auth-input-group">
                <label for="auth-password">Contraseña</label>
                <input type="password" id="auth-password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="auth-error-container" id="auth-error-msg" style="display: none;"></div>

            <button type="submit" id="auth-submit-btn" class="auth-submit-btn">Ingresar</button>
        </form>
    </div>
</div>
