<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Multi Ideas Sv</title>
    <link rel="icon" href="imagenes/iconos_generales/multiideassv_ico.webp?v=1" type="image/webp">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header id="global-header"></header>

    <section class="contacto-section">
        <div class="section-title">
            <h2>Hagamos algo <span class="gradient-text">Increíble</span></h2>
            <p>Elige tu canal preferido y hablemos sobre tu próximo gran proyecto.</p>
        </div>

        <div class="contacto-container">
            <div class="redes-grid">
                <a href="https://wa.me/503XXXXXXXX?text=Hola,%20me%20gustaría%20cotizar%20un%20proyecto" class="red-card whatsapp" target="_blank" rel="noopener noreferrer">
                    <img src="imagenes/iconos_redes/whatsapp_ico.png" alt="WhatsApp">
                    <span>WhatsApp Directo</span>
                </a>
                <a href="https://facebook.com/tu-usuario" class="red-card facebook" target="_blank" rel="noopener noreferrer">
                    <img src="imagenes/iconos_redes/facebook_ico.png" alt="Facebook">
                    <span>Comunidad Facebook</span>
                </a>
                <a href="https://instagram.com/tu-usuario" class="red-card instagram" target="_blank" rel="noopener noreferrer">
                    <img src="imagenes/iconos_redes/instagram_ico.png" alt="Instagram">
                    <span>Instagram Feed</span>
                </a>
                <a href="https://tiktok.com/@tu-usuario" class="red-card tiktok" target="_blank" rel="noopener noreferrer">
                    <img src="imagenes/iconos_redes/tiktok_ico.png" alt="TikTok">
                    <span>Contenido TikTok</span>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Multi Ideas Sv. San Salvador, El Salvador. Todos los derechos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
